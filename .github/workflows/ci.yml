name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: PHP ${{ matrix.php }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.5'

    env:
      COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
          extensions: bcmath, ctype, curl, dom, fileinfo, gd, iconv, intl, mbstring, openssl, pdo_mysql, simplexml, soap, sockets, sodium, xsl, zip
          ini-values: memory_limit=-1

      - name: Configure Magento Composer repository
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${COMPOSER_AUTH:-}" ]]; then
            echo "::error::The COMPOSER_AUTH repository secret is not configured."
            echo "::error::Create it as JSON containing http-basic credentials for repo.magento.com."
            exit 1
          fi

          php -r 'json_decode(getenv("COMPOSER_AUTH"), true, 512, JSON_THROW_ON_ERROR);'

          composer config --global repositories.magento composer https://repo.magento.com/

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-lock

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Audit dependencies
        run: composer audit --locked --abandoned=report --no-interaction

      - name: Validate PHP syntax
        shell: bash
        run: |
          set -euo pipefail

          find . \
            -path './vendor' -prune -o \
            -path './.git' -prune -o \
            -type f -name '*.php' -print0 \
            | xargs -0 -r -n1 php -l

      - name: Validate XML
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' file; do
            php -r '
              $document = new DOMDocument();
              if (!$document->load($argv[1])) {
                  exit(1);
              }
            ' "${file}"
          done < <(find etc view -type f -name '*.xml' -print0)

      - name: Run PHPCS
        run: composer phpcs

      - name: Run unit tests
        run: composer test

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - checks
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must use vX.Y.Z format."
            exit 1
          fi

          version="${tag#v}"

          composer_version="$(php -r '
            $composer = json_decode(file_get_contents("composer.json"), true, 512, JSON_THROW_ON_ERROR);
            echo $composer["version"] ?? "";
          ')"

          if [[ -n "${composer_version}" && "${composer_version}" != "${version}" ]]; then
            echo "::error::composer.json version ${composer_version} does not match tag ${tag}."
            exit 1
          fi

          if ! grep -Fq "## [${version}] - " CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no dated ${version} release section."
            exit 1
          fi

      - name: Build release archive
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          archive="mosaicora-module-opengraph-${version}.zip"

          git archive \
            --format=zip \
            --prefix="mosaicora-module-opengraph-${version}/" \
            --output="${archive}" \
            "${GITHUB_REF_NAME}"

          echo "RELEASE_ARCHIVE=${archive}" >> "${GITHUB_ENV}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${RELEASE_ARCHIVE}" \
            --verify-tag \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"