name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: PHP ${{ matrix.php }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.5'

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Configure Composer authentication
        env:
          COMPOSER_AUTH_JSON: ${{ secrets.COMPOSER_AUTH }}
        shell: bash
        run: |
          if [[ -z "${COMPOSER_AUTH_JSON}" ]]; then
            echo "::error::The COMPOSER_AUTH repository secret is not configured."
            exit 1
          fi

          php -r '
              $auth = getenv("COMPOSER_AUTH_JSON");
              json_decode($auth, true, 512, JSON_THROW_ON_ERROR);
              file_put_contents("auth.json", $auth . PHP_EOL);
          '
          chmod 600 auth.json

      - name: Validate Composer metadata
        run: composer validate --no-check-lock

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Audit dependencies
        run: composer audit --locked --abandoned=report

      - name: Validate PHP syntax
        shell: bash
        run: |
          find Api Block Controller Model Observer Plugin Setup Test \
            -type f -name '*.php' -print0 \
            | xargs -0 -n1 php -l
          php -l registration.php

      - name: Validate XML
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            php -r '
                $document = new DOMDocument();
                if (!$document->load($argv[1])) {
                    exit(1);
                }
            ' "${file}"
          done < <(find etc view -type f -name '*.xml' -print0)

      - name: Run PHPCS
        run: composer phpcs

      - name: Run unit tests
        run: composer test

      - name: Remove Composer authentication
        if: always()
        run: rm -f auth.json

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - checks
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release metadata
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must use vX.Y.Z format."
            exit 1
          fi

          version="${tag#v}"
          composer_version="$(php -r '
              $composer = json_decode(file_get_contents("composer.json"), true, 512, JSON_THROW_ON_ERROR);
              echo $composer["version"] ?? "";
          ')"

          if [[ "${composer_version}" != "${version}" ]]; then
            echo "::error::composer.json version ${composer_version} does not match tag ${tag}."
            exit 1
          fi

          if ! grep -Fq "## [${version}] - " CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no dated ${version} release section."
            exit 1
          fi

      - name: Build release archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="mosaicora-module-opengraph-${version}.zip"
          git archive \
            --format=zip \
            --prefix="mosaicora-module-opengraph-${version}/" \
            --output="${archive}" \
            "${GITHUB_REF_NAME}"
          echo "RELEASE_ARCHIVE=${archive}" >> "${GITHUB_ENV}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${RELEASE_ARCHIVE}" \
            --verify-tag \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
